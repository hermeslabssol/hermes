# Anchor workspace for the Hermes on-chain programs (Hermes Labs).
#
#   receipt-registry — anchors per-slot agent decision receipts.
#   hermes-faucet    — testnet $HERMES SPL faucet with per-wallet cooldown.

[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.17"

[features]
resolution = true
skip-lint = false

[programs.localnet]
receipt_registry = "ATNjhU9qwjziAcnS5tcrPPFcrszB9RevcDs9MJkf6MH2"
hermes_faucet = "AvPqHdw2HCY8RAEHVqpRiE98SaQENAuj6xjnH8nvWbF2"

[programs.devnet]
receipt_registry = "ATNjhU9qwjziAcnS5tcrPPFcrszB9RevcDs9MJkf6MH2"
hermes_faucet = "AvPqHdw2HCY8RAEHVqpRiE98SaQENAuj6xjnH8nvWbF2"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/anchor/**/*.ts"

[test]
startup_wait = 8000
shutdown_wait = 2000

[test.validator]
url = "https://api.devnet.solana.com"
