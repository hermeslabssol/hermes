# Dependabot is configured but intentionally disabled for now
# (open-pull-requests-limit: 0). The agent batches dependency review on its own
# cadence; flip the limits up to re-enable automated PRs.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/sdk/ts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
